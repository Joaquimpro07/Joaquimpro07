<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="profilecard.css">
</head>
<body>

    <div class="profilecard">
        <div class="profiletop">
            <div class="profileimage"> </div>
        </div>

        <div class="profilebottom">
            <div class="profileinfos">
                <div class="maininfos">
                    <h3 class="name">Joaquim d'ALMEIDA</h3>
                    <p class="grey"> 18 y/o </p>
                </div>
                <p class="email"> développeur web passionné </p>
                <p class="ville"><ion-icon name="location-outline"></ion-icon> Lomé, Togo </p>
            </div>

            <div class="profilestats">
                <div class="stat-item">
                    <p class="stat"> 90% </p>
                    <p class="grey"><ion-icon name="logo-html5"></ion-icon> html</p>
                </div>

                <div class="stat-item">
                    <p class="stat"> 80% </p>
                    <p class="grey"><ion-icon name="logo-css3"></ion-icon> css</p>
                </div>

                <div class="stat-item">
                    <p class="stat"> 60% </p>
                    <p class="grey"><ion-icon name="logo-javascript"></ion-icon> javascript</p>
                </div>

            </div>
        </div>

        <button ><a href="portfolio.html"> voir plus </a></button>
        
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
